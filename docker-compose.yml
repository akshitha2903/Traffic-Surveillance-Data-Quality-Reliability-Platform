# ============================================
# Traffic Quality Platform — Local Dev Stack
# Run: docker compose up
# ============================================

services:

  # ---- PostgreSQL with TimescaleDB extension ----
  # Stores: cameras, frames, counts, anomalies, alerts (time-series friendly)
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: traffic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-traffic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-traffic_pass}
      POSTGRES_DB: ${POSTGRES_DB:-traffic_quality}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-traffic_user} -d ${POSTGRES_DB:-traffic_quality}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  # Used for: real-time pub/sub, rate limiting, fast cache
  redis:
    image: redis:7-alpine
    container_name: traffic_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Qdrant (vector database) ----
  # Used for: historical pattern similarity search (Phase 3)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: traffic_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ---- FastAPI Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: traffic_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
